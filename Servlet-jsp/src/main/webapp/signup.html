<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <p class="eyebrow">Company Portal</p>
      <h1>Create Account</h1>
      <p class="subtitle">Fill in the details below to register a new employee account.</p>

      <div class="alert error" id="signup-failed" hidden>Signup failed. Try again.</div>
      <div class="alert error" id="signup-error" hidden>Server error while creating the account.</div>

      <form action="NewEmployee" method="post" class="auth-form">
        <label for="firstName">First Name</label>
        <input type="text" name="firstName" id="firstName" placeholder="Enter first name" required>

        <label for="lastName">Last Name</label>
        <input type="text" name="lastName" id="lastName" placeholder="Enter last name" required>

        <label for="email">Email</label>
        <input type="email" name="email" id="email" placeholder="Enter email" required>

        <label for="address">Address</label>
        <input type="text" name="address" id="address" placeholder="Enter address" required>

        <label for="contact">Contact</label>
        <input type="text" name="contact" id="contact" placeholder="Enter contact number" required>

        <label for="password">Password</label>
        <input type="password" name="password" id="password" placeholder="Enter password" required>

        <button type="submit" class="primary-button">Sign Up</button>
      </form>

      <p class="switch-text">Already have an account?</p>
      <a class="secondary-button" href="Login.html">Back to login</a>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById("signup-failed").hidden = params.get("failed") !== "true";
    document.getElementById("signup-error").hidden = params.get("error") !== "true";
  </script>
</body>
</html>
